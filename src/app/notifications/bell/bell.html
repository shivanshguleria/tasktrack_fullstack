<div class="relative">

  <!-- Bell -->
  <div class="relative cursor-pointer"
       (click)="toggle()">

    <!-- ✅ SVG ICON (Replace Emoji With This) -->
    <svg xmlns="http://www.w3.org/2000/svg"
         class="h-6 w-6 text-gray-600 hover:text-indigo-600 transition duration-200"
         fill="none"
         viewBox="0 0 24 24"
         stroke="currentColor">

      <path stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 
               2.032 0 0118 14.158V11a6.002 
               6.002 0 00-4-5.659V5a2 
               2 0 10-4 0v.341C7.67 
               6.165 6 8.388 6 11v3.159c0 
               .538-.214 1.055-.595 
               1.436L4 17h5m6 0v1a3 3 0 
               11-6 0v-1m6 0H9"/>
    </svg>

    <!-- Badge -->
    <span *ngIf="unreadCount>0"
          class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-semibold rounded-full px-2 py-0.5">
        {{ unreadCount }}
    </span>

  </div>

  <!-- Dropdown -->
  <div *ngIf="open"
       class="absolute right-0 mt-3 w-80 bg-white rounded-xl shadow-lg border border-gray-200 max-h-96 overflow-y-auto z-50">

    <div *ngFor="let n of notifications"
         (click)="markRead(n.notificationId)"
         class="px-4 py-3 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition"
         [class.bg-blue-50]="n.status==='UNREAD'"
         [class.font-semibold]="n.status==='UNREAD'">

        <p class="text-sm text-gray-800">
          {{n.message}}
        </p>

        <p class="text-xs text-gray-400 mt-1">
          {{n.createdDate | date:'short'}}
        </p>

    </div>

    <div *ngIf="notifications.length==0"
         class="text-center py-6 text-gray-400">
      No notifications
    </div>

  </div>

</div>
