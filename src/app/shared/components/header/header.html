<header class="sticky top-0 z-50 flex items-center justify-between border-b px-6 py-3 transition-colors backdrop-blur-md 
               bg-white/80 border-slate-200 
               dark:bg-zinc-900/80 dark:border-zinc-800">

  
    <a routerLink="{{homeUrl}}"  class="flex cursor-pointer items-center gap-2" >
    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 shadow-sm shadow-indigo-500/20">
      <span class="text-sm font-black text-white">T</span>
    </div>
    <span class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">TaskTrack</span>
    </a>

  

  <div class="flex items-center gap-5">
    
    <div class="hidden items-center gap-2 rounded-full border px-3 py-1 sm:flex
                bg-slate-50 border-slate-200 
                dark:bg-zinc-800 dark:border-zinc-700">
      <div class="h-1.5 w-1.5 rounded-full bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.6)]"></div>
      <span class="text-[10px] font-black uppercase tracking-widest text-slate-600 dark:text-zinc-300">
        {{ currentRole }}
      </span>
    </div>

     <div class="flex items-center gap-3 border-l pl-5 border-slate-200 dark:border-zinc-800">
      <!--<button class="relative transition-colors text-slate-500 hover:text-indigo-600 dark:text-zinc-400 dark:hover:text-white">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
        <span class="absolute -right-1 -top-1 h-2 w-2 rounded-full border-2 bg-indigo-500 border-white dark:border-zinc-900"></span>
      </button> 
      <div class="flex justify-between items-center px-6 py-4 bg-white shadow">-->
       <app-bell ></app-bell> 
      </div>

      <div class="relative">
        <button (click)="toggleMenu()" class="group flex items-center gap-2">
          <div class="flex h-8 w-8 items-center justify-center rounded-full border transition-all 
                      bg-slate-100 border-slate-200 group-hover:border-indigo-400
                      dark:bg-zinc-800 dark:border-zinc-700 dark:group-hover:border-indigo-500/50">
            <svg class="h-4 w-4 text-slate-500 group-hover:text-indigo-600 dark:text-zinc-400 dark:group-hover:text-white" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
            </svg>
          </div>
        </button>

        @if (isMenuOpen) {
          <div class="absolute right-0 mt-3 w-44 rounded-xl border p-1 shadow-xl z-50
                      bg-white border-slate-200 
                      dark:bg-zinc-900 dark:border-zinc-800">
            <button (click)="onLogout()" 
                    class="flex w-full items-center gap-2 rounded-lg px-4 py-2 text-xs font-bold transition-colors
                           text-red-500 hover:bg-red-50 
                           dark:text-red-400 dark:hover:bg-red-500/10">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              LOGOUT
            </button>
          </div>
        }
      </div>
    </div>
</header>
