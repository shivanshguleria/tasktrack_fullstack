<div class="relative">
  <div class="relative cursor-pointer group p-2 rounded-xl transition-all hover:bg-zinc-100 dark:hover:bg-zinc-800"
       (click)="toggle()">
    
    <svg xmlns="http://www.w3.org/2000/svg"
         class="h-5 w-5 text-zinc-500 group-hover:text-indigo-600 dark:text-zinc-400 dark:group-hover:text-white transition-colors"
         fill="none"
         viewBox="0 0 24 24"
         stroke="currentColor"
         stroke-width="2.5">
      <path stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
    </svg>

    @if (unreadCount() > 0) {
      <span class="absolute top-1.5 right-1.5 flex h-4 w-4 items-center justify-center bg-indigo-600 text-[9px] font-black text-white rounded-full ring-2 ring-white dark:ring-zinc-950 animate-in zoom-in">
          {{ unreadCount() }}
      </span>
    }
  </div>

  @if (open) {
    <div class="absolute right-0 mt-4 w-80 bg-white dark:bg-zinc-900 rounded-[1.5rem] shadow-2xl border border-zinc-200 dark:border-zinc-800 overflow-hidden z-[70] animate-in fade-in zoom-in-95 duration-200">
      
      <div class="px-5 py-4 border-b border-zinc-100 dark:border-zinc-800 flex justify-between items-center bg-zinc-50/50 dark:bg-zinc-900/50">
        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">Notifications</span>
        <!-- @if (unreadCount > 0) {
          <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest cursor-pointer hover:text-indigo-400 transition-colors">
            Clear All
          </span>
        } -->
      </div>

      <div class="max-h-80 overflow-y-auto">
        @for (n of notifications(); track n.notificationId) {
          <div (click)="markRead(n.notificationId)"
               class="px-5 py-4 border-b border-zinc-50 dark:border-zinc-800/50 cursor-pointer transition-all hover:bg-zinc-50 dark:hover:bg-zinc-800/50 group"
               [class.bg-indigo-50/30]="n.status === 'UNREAD'"
               [class.dark:bg-indigo-500/5]="n.status === 'UNREAD'">

              <div class="flex gap-3">
                @if (n.status === 'UNREAD') {
                  <div class="mt-1.5 h-1.5 w-1.5 rounded-full bg-indigo-500 shrink-0 shadow-[0_0_8px_rgba(99,102,241,0.6)]"></div>
                }
                
                <div class="space-y-1">
                  <p class="text-xs font-bold leading-relaxed text-zinc-800 dark:text-zinc-200"
                     [class.text-zinc-950]="n.status === 'UNREAD'"
                     [class.dark:text-white]="n.status === 'UNREAD'">
                    {{ n.message }}
                  </p>

                  <p class="text-[10px] font-medium text-zinc-400 uppercase tracking-tight tabular-nums">
                    {{ n.createdDate | date:'MMM dd • HH:mm' }}
                  </p>
                </div>
              </div>
          </div>
        } @empty {
          <div class="flex flex-col items-center justify-center py-12 px-6 text-center">
            <div class="h-10 w-10 rounded-full bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center mb-3">
              <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500">Log Clear</p>
          </div>
        }
      </div>

  
    </div>
  }
</div>
