<header class="sticky top-0 z-50 flex items-center justify-between border-b px-8 py-4 transition-all duration-500 backdrop-blur-xl 
               bg-white/70 border-zinc-200 
               dark:bg-zinc-950/70 dark:border-zinc-800/50">

  <a routerLink="{{homeUrl}}" class="group flex cursor-pointer items-center gap-3">
    <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-zinc-900 shadow-2xl shadow-indigo-500/20 group-hover:bg-indigo-600 transition-all duration-300 dark:bg-white">
      <span class="text-base font-black text-white dark:text-zinc-950 group-hover:scale-110 transition-transform">T</span>
    </div>
    <div class="flex flex-col">
      <span class="text-sm font-black uppercase tracking-[0.3em] text-zinc-900 dark:text-white leading-none">TaskTrack</span>
    </div>
  </a>

  <div class="flex items-center gap-6">
    
    <div class="hidden items-center gap-2.5 rounded-xl border px-4 py-1.5 sm:flex
                bg-zinc-50 border-zinc-200 
                dark:bg-zinc-900 dark:border-zinc-800">
      <div class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
      </div>
      <span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-600 dark:text-zinc-300">
        {{ currentRole }}
      </span>
    </div>

    <div class="flex items-center gap-4 border-l pl-6 border-zinc-200 dark:border-zinc-800">
      

      <app-bell></app-bell>

      <div class="relative">
        <button (click)="toggleMenu()" class="group flex items-center gap-2 p-1 rounded-2xl transition-all hover:bg-zinc-100 dark:hover:bg-zinc-800">
          <div class="flex h-9 w-9 items-center justify-center rounded-xl border-2 transition-all 
                      bg-white border-zinc-200 group-hover:border-indigo-500
                      dark:bg-zinc-900 dark:border-zinc-700 dark:group-hover:border-indigo-500">
            <svg class="h-5 w-5 text-zinc-400 group-hover:text-indigo-600 dark:group-hover:text-white" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
            </svg>
          </div>
          <svg class="w-4 h-4 text-zinc-400 group-hover:text-zinc-900 dark:group-hover:text-white transition-transform duration-300" [class.rotate-180]="isMenuOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        @if (isMenuOpen) {
          <div class="absolute right-0 mt-4 w-56 rounded-[1.5rem] border p-2 shadow-2xl z-50
                      bg-white border-zinc-200 animate-in fade-in zoom-in-95 duration-200
                      dark:bg-zinc-900 dark:border-zinc-800">
        
            <button (click)="onLogout()" 
                    class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-[10px] font-black tracking-[0.15em] transition-all
                           text-rose-500 hover:bg-rose-50 
                           dark:text-rose-400 dark:hover:bg-rose-500/10">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              LOGOUT
            </button>
          </div>
        }
      </div>
    </div>
    </div></header>
