<app-header></app-header>

<main class="p-6 md:p-10 bg-zinc-50 dark:bg-zinc-950 min-h-screen transition-all duration-500">
  
  <div class="max-w-7xl mx-auto mb-10">
    <nav class="flex items-center gap-2 text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-4">
      <span>System</span>
      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 5l7 7-7 7" stroke-width="3"/></svg>
      <span class="text-zinc-400 dark:text-zinc-500">Modules</span>
    </nav>
    <h1 class="text-4xl md:text-5xl font-black text-zinc-900 dark:text-white tracking-tighter uppercase">
      Directory
    </h1>
  </div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    @for (c of allComponents; track c.name) {
      <div class="group flex flex-col justify-between rounded-[2rem] border border-zinc-200 bg-white p-2 transition-all 
                  hover:shadow-[0_20px_50px_rgba(0,0,0,0.08)] hover:border-indigo-500/30 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:border-indigo-500/50">
        
        <div class="p-6">
          <div class="w-12 h-12 mb-6 rounded-2xl bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-lg font-black text-indigo-600 dark:text-indigo-400 group-hover:scale-110 transition-transform">
            {{c.name.substring(0,1).toUpperCase()}}
          </div>

          <h3 class="text-xl font-black text-zinc-900 dark:text-zinc-100 leading-tight uppercase tracking-tight">
            {{c.name}}
          </h3>
          <p class="mt-3 text-sm font-medium text-zinc-500 dark:text-zinc-400 leading-relaxed">
            {{c.componentDescription}}
          </p>
        </div>

        <div class="flex flex-col gap-2 p-4 pt-0">
          @for (link of c.links; track link.href) {
            <a 
              [routerLink]="link.href"
              class="relative overflow-hidden inline-flex items-center justify-between rounded-2xl px-5 py-4 text-[11px] font-black uppercase tracking-widest transition-all
                     bg-zinc-50 text-zinc-600 hover:bg-indigo-600 hover:text-white 
                     dark:bg-zinc-800/50 dark:text-zinc-300 dark:hover:bg-indigo-600 dark:hover:text-white"
            >
              <span>{{link.name}}</span>
              <svg class="w-4 h-4 opacity-0 -translate-x-2 group-hover/link:opacity-100 group-hover/link:translate-x-0 transition-all" 
                   fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path d="M13 7l5 5m0 0l-5 5m5-5H6" />
              </svg>
            </a>
          }
        </div>
       

        
      </div>

       
    }
  </div>
</main>
