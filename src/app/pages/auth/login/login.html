


<div class="min-h-screen flex items-center justify-center bg-zinc-50 dark:bg-zinc-950 px-4 relative overflow-hidden transition-colors duration-500">
  
  <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-indigo-600/5 dark:bg-indigo-500/10 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-zinc-900/5 dark:bg-zinc-100/5 rounded-full blur-[100px]"></div>

  <div class="w-full max-w-md z-10">
    <div class="bg-white dark:bg-zinc-900/80 backdrop-blur-2xl border border-zinc-200 dark:border-zinc-800 p-10 rounded-[3rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] dark:shadow-2xl">
      
      <div class="flex flex-col items-center mb-10">
        <div class="flex h-14 w-14 items-center justify-center rounded-[1.25rem] bg-zinc-900 dark:bg-white mb-6 shadow-xl shadow-indigo-500/20">
          <span class="text-2xl font-black text-white dark:text-zinc-950">T</span>
        </div>
        <h2 class="text-3xl font-black text-zinc-900 dark:text-white tracking-tighter uppercase mb-2">
          TaskTrack
        </h2>

      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6">
        <div class="space-y-2">
          <label class="block text-[10px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-[0.2em] ml-2">
            Email
          </label>
          <div class="relative group">
            <input type="email" formControlName="email" 
                   placeholder="name@company.com"
                   class="w-full bg-zinc-50 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 rounded-2xl px-5 py-4 text-sm text-zinc-900 dark:text-white placeholder:text-zinc-400 dark:placeholder:text-zinc-600 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all">
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center px-2">
            <label class="block text-[10px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-[0.2em]">
              Password
            </label>
          </div>
          <input type="password" formControlName="password" 
                 placeholder="••••••••"
                 class="w-full bg-zinc-50 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 rounded-2xl px-5 py-4 text-sm text-zinc-900 dark:text-white placeholder:text-zinc-400 dark:placeholder:text-zinc-600 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all">
        </div>

        <button type="submit" [disabled]="loginForm.invalid"
                class="w-full bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 text-[11px] font-black uppercase tracking-[0.2em] py-5 rounded-2xl transition-all hover:bg-indigo-600 dark:hover:bg-indigo-500 dark:hover:text-white shadow-xl shadow-indigo-500/10 active:scale-[0.98] disabled:opacity-30 disabled:grayscale disabled:active:scale-100">
          Sign In
        </button>
      </form>

      <div class="mt-10 text-center">
        <p class="text-[10px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">
          New to the platform? 
          <a routerLink="/signup" class="text-indigo-500 hover:text-indigo-400 ml-1 transition-colors">
            Sign up
          </a>
        </p>
      </div>
    </div>
    

  </div>
</div>
